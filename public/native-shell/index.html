<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#090806" />
    <title>The Common Collective</title>
    <style>
      :root {
        color-scheme: dark;
        font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Helvetica Neue", sans-serif;
        background: #090806;
        color: #f6f0e4;
      }

      body {
        min-height: 100vh;
        margin: 0;
        display: grid;
        place-items: center;
        background:
          radial-gradient(circle at 50% 0%, rgba(213, 173, 87, 0.18), transparent 38%),
          linear-gradient(180deg, #0c0a07 0%, #090806 100%);
      }

      main {
        width: min(82vw, 340px);
        padding: 32px;
        border: 1px solid rgba(213, 173, 87, 0.18);
        border-radius: 32px;
        background: rgba(23, 21, 17, 0.72);
        box-shadow: 0 32px 90px -44px rgba(0, 0, 0, 0.95);
        text-align: center;
      }

      .mark {
        display: flex;
        justify-content: center;
        gap: 8px;
        margin-bottom: 24px;
      }

      .ring {
        width: 44px;
        height: 44px;
        border: 4px solid #d5ad57;
        border-radius: 999px;
      }

      h1 {
        margin: 0;
        font-family: Georgia, "Times New Roman", serif;
        font-size: 34px;
        line-height: 0.98;
        letter-spacing: -0.04em;
      }

      p {
        margin: 16px 0 0;
        color: rgba(246, 240, 228, 0.62);
        font-size: 14px;
        line-height: 1.65;
      }

      a {
        display: inline-flex;
        margin-top: 24px;
        border-radius: 999px;
        background: #d5ad57;
        color: #16120c;
        padding: 12px 18px;
        font-size: 12px;
        font-weight: 700;
        letter-spacing: 0.14em;
        text-decoration: none;
        text-transform: uppercase;
      }
    </style>
  </head>
  <body>
    <main>
      <div class="mark" aria-hidden="true">
        <span class="ring"></span>
        <span class="ring"></span>
        <span class="ring"></span>
      </div>
      <h1>The Common Collective</h1>
      <p>Connecting to your private member app.</p>
      <a href="https://www.thecommoncollective.space">Open app</a>
    </main>
  </body>
</html>
